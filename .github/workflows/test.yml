name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install dependencies (optional)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Run tests
        run: make test
